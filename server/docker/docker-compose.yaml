services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: live-polls-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/live_polls
      JWT_SECRET: change-me-in-production
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: pulse-board-postgres
    environment:
      POSTGRES_DB: live_polls
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d live_polls"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pulse-board-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
